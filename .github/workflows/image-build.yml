name: Image Build

on:
  schedule:
    # Daily refresh build for latest upstream OS/package patches.
    - cron: "20 3 * * *"
  workflow_dispatch:
    inputs:
      os:
        description: "Image key from catalog (for example: rhel9, win2022, or all)"
        required: true
        default: "rhel9"
      clouds:
        description: "Comma-separated clouds to build: aws,azure,gcp"
        required: true
        default: "aws,azure,gcp"
      channel:
        description: "Lifecycle channel (candidate|prod). Typically candidate for builds."
        required: true
        default: "candidate"
      image_version:
        description: "Optional image version override. If empty, workflow generates one."
        required: false
        default: ""
      run_terratest:
        description: "Run example Terratest after each matrix build (true|false)"
        required: false
        default: "false"
      publish_cis_sarif:
        description: "Publish CIS summary as SARIF to GitHub Security (true|false)"
        required: false
        default: "true"

permissions:
  id-token: write
  contents: read
  security-events: write

concurrency:
  # Wrapper-level concurrency guards trigger-level duplication.
  group: ${{ github.repository }}-${{ github.ref_name }}-image-build-wrapper-${{ github.event.inputs.os || 'all' }}-${{ github.event.inputs.clouds || 'aws,azure,gcp' }}-${{ github.event.inputs.channel || 'candidate' }}
  cancel-in-progress: false

jobs:
  build:
    # Delegate all heavy lifting to reusable workflow for consistency and reuse.
    uses: ./.github/workflows/reusable-image-build.yml
    with:
      os: ${{ github.event.inputs.os || '' }}
      clouds: ${{ github.event.inputs.clouds || '' }}
      channel: ${{ github.event.inputs.channel || '' }}
      image_version: ${{ github.event.inputs.image_version || '' }}
      run_terratest: ${{ github.event.inputs.run_terratest || '' }}
      publish_cis_sarif: ${{ github.event.inputs.publish_cis_sarif || '' }}
    secrets: inherit
