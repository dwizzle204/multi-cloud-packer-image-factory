name: Terratest OS Examples

on:
  # Manual trigger for SSH/WinRM examples against existing hosts.
  workflow_dispatch:
    inputs:
      target:
        description: "Example test target: rhel8 | rhel9 | windows2022"
        required: true
        default: "rhel9"

permissions:
  contents: read

concurrency:
  # Keep one run per target example at a time.
  group: ${{ github.repository }}-${{ github.ref_name }}-terratest-os-example-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  run-os-example:
    # Purposefully lightweight examples for quick, targeted validation.
    runs-on: ubuntu-latest
    steps:
      - name: Validate target
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.target }}" in
            rhel8|rhel9|windows2022) ;;
            *) echo "Invalid target" >&2; exit 1 ;;
          esac

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Prepare SSH key material
        shell: bash
        env:
          TERRATEST_RHEL_SSH_PRIVATE_KEY: ${{ secrets.TERRATEST_RHEL_SSH_PRIVATE_KEY }}
          TERRATEST_WINDOWS_SSH_PRIVATE_KEY: ${{ secrets.TERRATEST_WINDOWS_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/terratest-keys"
          chmod 700 "$RUNNER_TEMP/terratest-keys"

          if [[ "${{ inputs.target }}" == "rhel8" || "${{ inputs.target }}" == "rhel9" ]]; then
            printf '%s\n' "$TERRATEST_RHEL_SSH_PRIVATE_KEY" > "$RUNNER_TEMP/terratest-keys/rhel.pem"
            chmod 600 "$RUNNER_TEMP/terratest-keys/rhel.pem"
          else
            printf '%s\n' "$TERRATEST_WINDOWS_SSH_PRIVATE_KEY" > "$RUNNER_TEMP/terratest-keys/windows.pem"
            chmod 600 "$RUNNER_TEMP/terratest-keys/windows.pem"
          fi

      - name: Run RHEL8 example
        if: inputs.target == 'rhel8'
        working-directory: tests/terratest
        shell: bash
        env:
          TERRATEST_ENABLE_RHEL_EXAMPLES: "true"
          TERRATEST_RHEL_TARGET_VERSION: "8"
          TERRATEST_RHEL_HOST: ${{ vars.TERRATEST_RHEL8_HOST }}
          TERRATEST_RHEL_SSH_USER: ${{ vars.TERRATEST_RHEL_SSH_USER }}
          TERRATEST_RHEL_SSH_PORT: ${{ vars.TERRATEST_RHEL_SSH_PORT }}
          TERRATEST_RHEL_SSH_PRIVATE_KEY_PATH: ${{ runner.temp }}/terratest-keys/rhel.pem
        run: |
          set -euo pipefail
          go test -v -run TestExampleRHEL8SmokeOverSSH ./...

      - name: Run RHEL9 example
        if: inputs.target == 'rhel9'
        working-directory: tests/terratest
        shell: bash
        env:
          TERRATEST_ENABLE_RHEL_EXAMPLES: "true"
          TERRATEST_RHEL_TARGET_VERSION: "9"
          TERRATEST_RHEL_HOST: ${{ vars.TERRATEST_RHEL9_HOST }}
          TERRATEST_RHEL_SSH_USER: ${{ vars.TERRATEST_RHEL_SSH_USER }}
          TERRATEST_RHEL_SSH_PORT: ${{ vars.TERRATEST_RHEL_SSH_PORT }}
          TERRATEST_RHEL_SSH_PRIVATE_KEY_PATH: ${{ runner.temp }}/terratest-keys/rhel.pem
        run: |
          set -euo pipefail
          go test -v -run TestExampleRHEL9SmokeOverSSH ./...

      - name: Run Windows 2022 examples
        if: inputs.target == 'windows2022'
        working-directory: tests/terratest
        shell: bash
        env:
          TERRATEST_ENABLE_WINDOWS_EXAMPLES: "true"
          TERRATEST_WINDOWS_HOST: ${{ vars.TERRATEST_WINDOWS2022_HOST }}
          TERRATEST_WINDOWS_SSH_USER: ${{ vars.TERRATEST_WINDOWS_SSH_USER }}
          TERRATEST_WINDOWS_SSH_PORT: ${{ vars.TERRATEST_WINDOWS_SSH_PORT }}
          TERRATEST_WINDOWS_SSH_PRIVATE_KEY_PATH: ${{ runner.temp }}/terratest-keys/windows.pem
        run: |
          set -euo pipefail
          go test -v -run 'TestExampleWindows2022SmokeOverSSH|TestExampleWindows2022WinRMService' ./...
